listen: 127.0.0.1:53
api_listen: 127.0.0.1:5380
use_tls: true
log_queries: false
dns_rebinding_protection: true
dnssec: true
service_mode: local
upstream:
    - 1.1.1.1:853
    - 8.8.8.8:853
    - 9.9.9.9:853
cache:
    enabled: true
    max_size: 10000
    min_ttl: 60
    stale_while_revalidate: true
rate_limit:
    enabled: true
    max_rps: 10
    burst_multiplier: 3
    whitelist_ips: []
    per_domain_max_rps: 0
blocklist:
    enabled: false
    files: []
    domains: []
    response_mode: nxdomain
    block_page:
        bind: 127.0.0.1:80
        ipv4: ""
        ipv6: ""
        html: |-
            <main class="shell">
              <section class="card">
                <p class="eyebrow">Blocked by SelfDNS</p>
                <h1>{{DOMAIN}}</h1>
                <p class="lead">This domain is blocked by your DNS server.</p>
                <p class="meta">If you need access, contact the DNS administrator and include the blocked domain shown above.</p>
                <div class="details">
                  <div>
                    <span class="label">Requested host</span>
                    <strong>{{HOST}}</strong>
                  </div>
                  <div>
                    <span class="label">Requested path</span>
                    <strong>{{PATH}}</strong>
                  </div>
                </div>
              </section>
            </main>
        css: |-
            :root {
              color-scheme: dark;
              --bg0: #081120;
              --bg1: #11243b;
              --panel: rgba(10, 18, 31, 0.86);
              --border: rgba(125, 167, 255, 0.16);
              --text: #f8fafc;
              --muted: #b8c4d8;
              --accent: #7dd3fc;
              --accent-2: #f59e0b;
            }

            * {
              box-sizing: border-box;
            }

            body {
              margin: 0;
              min-height: 100vh;
              font-family: "Inter", "Segoe UI", sans-serif;
              color: var(--text);
              background:
                radial-gradient(circle at top left, rgba(125, 211, 252, 0.22), transparent 34%),
                radial-gradient(circle at bottom right, rgba(245, 158, 11, 0.18), transparent 26%),
                linear-gradient(135deg, var(--bg0), var(--bg1));
            }

            .shell {
              min-height: 100vh;
              display: grid;
              place-items: center;
              padding: 32px 18px;
            }

            .card {
              width: min(720px, 100%);
              padding: 32px;
              border-radius: 28px;
              background: var(--panel);
              border: 1px solid var(--border);
              box-shadow: 0 24px 80px rgba(2, 6, 23, 0.42);
              backdrop-filter: blur(18px);
            }

            .eyebrow {
              margin: 0 0 14px;
              letter-spacing: 0.16em;
              text-transform: uppercase;
              font-size: 12px;
              color: var(--accent);
            }

            h1 {
              margin: 0;
              font-size: clamp(32px, 7vw, 56px);
              line-height: 0.94;
            }

            .lead {
              margin: 20px 0 10px;
              font-size: 18px;
              color: var(--text);
            }

            .meta {
              margin: 0;
              font-size: 14px;
              line-height: 1.6;
              color: var(--muted);
            }

            .details {
              margin-top: 28px;
              display: grid;
              grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
              gap: 14px;
            }

            .details > div {
              padding: 16px 18px;
              border-radius: 18px;
              background: rgba(15, 23, 42, 0.66);
              border: 1px solid rgba(148, 163, 184, 0.14);
            }

            .label {
              display: block;
              margin-bottom: 8px;
              font-size: 11px;
              text-transform: uppercase;
              letter-spacing: 0.12em;
              color: var(--accent-2);
            }
        js: |-
            document.documentElement.dataset.blockedDomain = window.SELFDNS_BLOCK_PAGE?.domain ?? "";
hosts:
    myapp.local: 127.0.0.1
